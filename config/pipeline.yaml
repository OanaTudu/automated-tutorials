pipeline:
  max_duration_seconds: 300
  output_root: outputs
  log_level: INFO

research:
  provider: azure_openai
  model: gpt-4.1
  max_output_tokens: 3000
  max_sources: 10
  cache:
    enabled: true
    ttl_days: 7
    cache_dir: outputs/.research_cache

script:
  provider: azure_openai
  model: gpt-4.1
  max_output_tokens: 4096
  temperature: 0.4
  schema_enforced: true

tts:
  primary: azure_openai_tts
  fallback: azure_openai_tts
  azure:
    voice: en-US-AvaMultilingualNeural
    style: narration-professional
    style_degree: "1.1"
    speaking_rate: "-5%"
    output_format: riff-24khz-16bit-mono-pcm
  openai:
    model: gpt-4o-mini-tts
    voice: coral
    instructions: "Speak in a clear tutorial tone, medium pace, warm and confident. You are narrating a data science tutorial with screen sharing."
    response_format: wav

recording:
  mode: playwright
  resolution: "1920x1080"
  fps: 30
  window_title: ""  # empty = full desktop capture
  playwright:
    viewport_width: 1280
    viewport_height: 720
    video: "on"
  obs:
    websocket_url: "ws://127.0.0.1:4455"
    collection: TutorialScenes
    profile: 1080p30
    scene: MainDemo

post:
  engine: ffmpeg
  crf: 20
  preset: medium
  audio_bitrate: 192k
  captions:
    engine: faster_whisper
    model: small
    device: cpu
    compute_type: int8
    burn_in: false
  validation:
    enabled: true
    duration_tolerance_pct: 15
    max_av_drift_sec: 0.5
    min_file_size_kb: 100

critique:
  enabled: true
  min_overall_grade: 7.0
  min_category_score: 4.0
  max_retries: 2
  run_before_publish: true
